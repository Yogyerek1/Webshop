services:
  nexus-db:
    image: postgres:latest
    container_name: nexus-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  nexus-api:
    build:
      context: ./NexusCore.API
      dockerfile: Dockerfile
    container_name: nexus_api
    restart: on-failure
    env_file:
      - .env
    ports:
      - "${API_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${APP_ENV}
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      - nexus-db
  
  nexus_ui:
    build:
      context: ./NexusCore.APP
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=${NODE_VERSION}
    container_name: nexus_ui
    restart: on-failure
    ports:
      - "${APP_PORT}:80"
    environment:
      - NODE_ENV=${APP_ENV}
    depends_on:
      - nexus-api

volumes:
  postgres_data: